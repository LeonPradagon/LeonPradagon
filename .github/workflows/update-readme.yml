name: Update README with Recent Activity

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours automatically
  push:
    branches:
      - main # Also runs on every push to main
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-readme:
    name: Update Recent Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Recent Activity in README
        uses: readme-workflows/recent-activity@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: LeonPradagon
          MAX_LINES: 5
          COMMIT_MSG: "⚡ Auto-update: recent GitHub activity"
          URL_TEXT: "{REPO} {ID}"
          COMMENTS_ACTIVITY: "🗣 Commented on {ID} in {REPO}"
          ISSUE_OPENED: "❗ Opened issue {ID} in {REPO}"
          ISSUE_CLOSED: "✅ Closed issue {ID} in {REPO}"
          PR_OPENED: "📬 Opened PR {ID} in {REPO}"
          PR_MERGED: "🎉 Merged PR {ID} in {REPO}"
          PUSHED: "⬆️ Pushed {AMOUNT} commit(s) to {REPO}"
          PR_REVIEWED: "👀 Reviewed PR {ID} in {REPO}"
